name: Deploy to production (kalca)

# Rucno pokretanje - klikom na "Run workflow" u GitHub Actions tabu.
# Nema automatskog deploy-a na svaki push, namerno, jer ovo je produkcioni server
# koji cuva realne finansijske podatke.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Basic syntax check (CI safety net)
        run: |
          echo "Checking out repo to validate Python syntax before touching production..."

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python syntax check
        run: |
          python3 -m py_compile app.py paycheck_sentinel/*.py
          echo "Syntax OK"

      - name: Connect to Tailscale (ephemeral, tag-scoped)
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Deploy over SSH via Tailscale
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" '
            set -e
            cd ~/bailiff-sentinel
            echo "--- git pull ---"
            git pull
            echo "--- installing dependencies ---"
            source venv/bin/activate
            pip install -q -r requirements.txt
            deactivate
            echo "--- restarting service ---"
            sudo systemctl restart paycheck-sentinel
            sleep 2
            sudo systemctl status paycheck-sentinel --no-pager
          '

      - name: Cleanup deploy key
        if: always()
        run: rm -f ~/.ssh/deploy_key
