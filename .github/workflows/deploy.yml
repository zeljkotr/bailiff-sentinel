name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m py_compile app.py paycheck_sentinel/*.py

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Deploy to meshcorers
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd ~/bailiff-sentinel && git pull && pip install -r requirements.txt && sudo systemctl restart paycheck-sentinel"
      - name: Health check
        run: |
          sleep 3
          curl -sf http://${{ secrets.STAGING_HOST }}:5000/ || (echo "Health check failed" && exit 1)

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Deploy to kalca
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ljuba@${{ secrets.DEPLOY_HOST }} \
            "cd ~/bailiff-sentinel && git pull && pip install -r requirements.txt && sudo systemctl restart paycheck-sentinel"
      - name: Health check
        run: |
          sleep 3
          curl -sf http://${{ secrets.DEPLOY_HOST }}:5000/ || (echo "Health check failed" && exit 1)
